name: Feishu Push Notification
on:
  push:
    branches: [ "main", "master" ]  # 改成你实际的主分支名，比如有的项目是 main，有的是 master
jobs:
  send-to-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: Send message to Feishu group
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.FEISHU_WEBHOOK }}
          method: POST
          contentType: 'application/json'
          data: |
            {
              "msg_type": "interactive",
              "card": {
                "config": {"wide_screen_mode": true},
                "header": {
                  "template": "blue",
                  "title": {"content": "📦 新的代码提交", "tag": "plain_text"}
                },
                "elements": [
                  {
                    "div": {
                      "text": {
                        "tag": "lark_md",
                        "content": "**仓库**：${{ github.repository }}\n**分支**：${{ github.ref_name }}\n**提交人**：${{ github.actor }}\n**提交信息**：${{ github.event.head_commit.message }}\n**提交链接**：${{ github.event.head_commit.url }}"
                      }
                    }
                  }
                ]
              }
            }
